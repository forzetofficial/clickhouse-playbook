---
- name: Create vector user
  user:
    name: vector
    system: yes
    shell: /sbin/nologin
    create_home: false

- name: Create Vector config directory
  file:
    path: "{{ vector_config_dir }}"
    state: directory
    owner: vector
    group: vector
    mode: '0755'

- name: Create Vector data directory
  file:
    path: "{{ vector_data_dir }}"
    state: directory
    owner: vector
    group: vector
    mode: '0755'

- name: Create Vector configuration file
  copy:
    content: |
      data_dir = "{{ vector_data_dir }}"
      
      [sources.demo_logs]
      type = "demo_logs"
      format = "json"
      interval = 1
      
      [sinks.console]
      type = "console"
      inputs = ["demo_logs"]
      target = "stdout"
      encoding.codec = "json"
    dest: "{{ vector_config_dir }}/vector.toml"
    owner: vector
    group: vector
    mode: '0644'
