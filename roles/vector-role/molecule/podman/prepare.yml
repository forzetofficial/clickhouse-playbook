---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      changed_when: false

    - name: Install python
      raw: apt install -y python3 python3-apt
      when: ansible_os_family == "Debian"
      changed_when: false

    - name: Gather facts
      setup:
      when: ansible_facts == {}
